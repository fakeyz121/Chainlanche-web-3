kind = "web"
previewPath = "/"
title = "ChainLance"
version = "1.0.0"
id = "artifacts/chainlance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23083

[services.development]
run = "pnpm --filter @workspace/chainlance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chainlance", "run", "build" ]
publicDir = "artifacts/chainlance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23083"
BASE_PATH = "/"
